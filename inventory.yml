all:
  children:
    # Ansible groups (all hosts must be in managed or unmanaged)
    managed:
      vars:
        ansible_host: "{{ host_ip_address }}"
        ansible_display_hostname: "{{ local_dns_name | default(inventory_hostname) }}"
        ansible_user: "{{ ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
        potential_path_dirs:
          - "/usr/bin"
          - "/bin"
          - "/usr/sbin"
          - "/sbin"
          - "/opt/homebrew/bin"
          - "/usr/local/bin"
          - "{{ ansible_env.HOME }}/.local/bin"
          - "{{ ansible_env.HOME }}/.cargo/bin"
          - "{{ ansible_env.HOME }}/bin"
          - "{{ ansible_env.HOME }}/homebrew"
      hosts:
        macmini:
        argonpi:
        bigmac:
        oci_free:
    unmanaged:
      vars:
        # Force a failure if anyone tries to run a task here
        ansible_user: "DO_NOT_USE" 
        ansible_ssh_common_args: "-o ProxyCommand='/usr/bin/false'"
      hosts:
        cctv:
        github:
    controller:
      vars:
        ansible_connection: local  # Do not try to connect over SSH.
      hosts:
        macmini:
    # Network groups (all hosts must be in exactly one of home, cloud and external)      
    home:
      vars:
        local_dns_name: "{{ inventory_hostname }}.home"
      hosts:
        macmini:
          host_ip_address: 192.168.86.226
          ssh_user: pdbartlett
        argonpi:
          host_ip_address: 192.168.86.232
          ssh_user: pdb
          tmux_path: /usr/bin/tmux
          apt_pkgs:
            - tmux
        bigmac:
          host_ip_address: 192.168.86.225
          ssh_user: pdbartlett
        cctv:
          host_ip_address: 192.168.86.224
    cloud:
      vars:
        local_dns_name: "{{ inventory_hostname }}.cloud"
      hosts:
        oci_free:
          host_ip_address: 84.8.151.76
          ssh_user: ubuntu
          tmux_path: /usr/bin/tmux
          apt_pkgs:
            - tmux
    external:
      hosts:
        github:
          fqdn: github.com
          ssh_user: git
    # OS groups (managed hosts must be in exactly one--currently darwin or debian, others may follow)
    macos:
      vars:
        shell_files:
          - shell_basics
          - shell_interactives
          - zshenv
          - zshrc
      hosts:
        bigmac:
        macmini:
          tmux_path: /opt/homebrew/bin/tmux
          use_uv: true
          brew_pkgs:
            - tmux
          cargo_pkgs:
            - cargo-clean-all
            - cargo-generate
            - cargo-update
            - trunk
    debian:
      vars:
        shell_files:
          - bash_profile
          - bashrc
          - profile
          - shell_basics
          - shell_interactives
      hosts:
        argonpi:
        oci_free:
